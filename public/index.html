<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFS Control Center | SmartFlow Systems</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sfs-black: #0D0D0D;
            --sfs-brown: #3B2F2F;
            --sfs-gold: #FFD700;
            --sfs-beige: #F5F5DC;
            --sfs-dark-gold: #B8860B;
            --sfs-light-brown: #4A3C3C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--sfs-black) 0%, var(--sfs-brown) 100%);
            color: var(--sfs-beige);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(59, 47, 47, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: var(--sfs-gold);
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            color: var(--sfs-beige);
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(59, 47, 47, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--sfs-gold);
        }

        .stat-label {
            color: var(--sfs-beige);
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .stat-value {
            color: var(--sfs-gold);
            font-size: 2.5em;
            font-weight: bold;
        }

        .services-section {
            margin-bottom: 30px;
        }

        .section-title {
            color: var(--sfs-gold);
            font-size: 1.8em;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid var(--sfs-gold);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .service-card {
            background: rgba(59, 47, 47, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-3px);
            border-color: var(--sfs-gold);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.2);
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .service-name {
            color: var(--sfs-gold);
            font-size: 1.3em;
            font-weight: bold;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-online {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        .status-offline {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        .status-checking {
            background: var(--sfs-gold);
            box-shadow: 0 0 10px var(--sfs-gold);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .service-description {
            color: var(--sfs-beige);
            opacity: 0.8;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .service-category {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            color: var(--sfs-gold);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            margin-bottom: 10px;
        }

        .service-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--sfs-gold);
            background: transparent;
            color: var(--sfs-gold);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9em;
        }

        .btn:hover {
            background: var(--sfs-gold);
            color: var(--sfs-black);
        }

        .btn-primary {
            background: var(--sfs-gold);
            color: var(--sfs-black);
        }

        .btn-primary:hover {
            background: var(--sfs-dark-gold);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--sfs-gold);
            font-size: 1.2em;
        }

        .spinner {
            border: 3px solid rgba(255, 215, 0, 0.3);
            border-top: 3px solid var(--sfs-gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--sfs-gold);
            color: var(--sfs-black);
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.1) rotate(180deg);
            box-shadow: 0 6px 24px rgba(255, 215, 0, 0.6);
        }

        .last-updated {
            text-align: center;
            color: var(--sfs-beige);
            opacity: 0.6;
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
  <link rel="stylesheet" href="public/assets/css/smartflow-theme.css" />
</head>
<body>
  <canvas id="circuit-canvas"></canvas>
    <div class="container">
        <header>
            <h1>🎯 SFS Control Center</h1>
            <p class="subtitle">Unified monitoring and management for all SmartFlow Systems services</p>
        </header>

        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Services</div>
                <div class="stat-value" id="total-services">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Online</div>
                <div class="stat-value" id="online-services" style="color: #00ff00;">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Offline</div>
                <div class="stat-value" id="offline-services" style="color: #ff0000;">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Health Score</div>
                <div class="stat-value" id="health-score">-</div>
            </div>
        </div>

        <div class="services-section">
            <h2 class="section-title">Service Status</h2>
            <div id="services-container" class="loading">
                <div class="spinner"></div>
                <p>Loading service status...</p>
            </div>
        </div>

        <div class="last-updated" id="last-updated"></div>
    </div>

    <button class="refresh-btn" onclick="loadServiceStatus()" title="Refresh Status">↻</button>

    <script>
        async function loadServiceStatus() {
            try {
                const response = await fetch('/api/services/status');
                const data = await response.json();

                // Update stats
                document.getElementById('total-services').textContent = data.summary.total;
                document.getElementById('online-services').textContent = data.summary.online;
                document.getElementById('offline-services').textContent = data.summary.offline;

                const healthScore = Math.round((data.summary.healthy / data.summary.total) * 100);
                document.getElementById('health-score').textContent = healthScore + '%';

                // Group services by category
                const servicesByCategory = {};
                data.services.forEach(service => {
                    if (!servicesByCategory[service.category]) {
                        servicesByCategory[service.category] = [];
                    }
                    servicesByCategory[service.category].push(service);
                });

                // Render services
                const container = document.getElementById('services-container');
                container.className = 'services-grid';
                container.innerHTML = '';

                Object.entries(servicesByCategory).forEach(([category, services]) => {
                    services.forEach(service => {
                        const card = createServiceCard(service);
                        container.appendChild(card);
                    });
                });

                // Update timestamp
                const now = new Date().toLocaleString();
                document.getElementById('last-updated').textContent = `Last updated: ${now}`;

            } catch (error) {
                console.error('Error loading service status');
                const errContainer = document.getElementById('services-container');
                errContainer.textContent = 'Error loading services. Please try again.';
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(String(str)));
            return div.innerHTML;
        }

        function createServiceCard(service) {
            const card = document.createElement('div');
            card.className = 'service-card';

            const statusClass = service.status === 'online' ? 'status-online' : 'status-offline';

            const header = document.createElement('div');
            header.className = 'service-header';

            const nameEl = document.createElement('div');
            nameEl.className = 'service-name';
            nameEl.textContent = service.name;

            const statusIndicator = document.createElement('div');
            statusIndicator.className = `status-indicator ${statusClass}`;
            header.appendChild(nameEl);
            header.appendChild(statusIndicator);

            const categoryEl = document.createElement('div');
            categoryEl.className = 'service-category';
            categoryEl.textContent = service.category;

            const descEl = document.createElement('div');
            descEl.className = 'service-description';
            descEl.textContent = service.description;

            const statusText = document.createElement('div');
            statusText.style.cssText = 'color: var(--sfs-beige); font-size: 0.85em; opacity: 0.7;';
            statusText.textContent = `Status: ${service.status.toUpperCase()} ${service.healthy ? '✓ Healthy' : '✗ Unhealthy'}`;

            card.appendChild(header);
            card.appendChild(categoryEl);
            card.appendChild(descEl);
            card.appendChild(statusText);

            return card;
        }

        // Auto-refresh every 30 seconds
        setInterval(loadServiceStatus, 30000);

        // Initial load
        loadServiceStatus();
    </script>
  <script src="public/assets/js/smartflow-app.js"></script>
</body>
</html>
